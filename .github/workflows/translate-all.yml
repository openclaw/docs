name: Translate Full

on:
  schedule:
    - cron: "17 3 * * 0"
  workflow_dispatch:
    inputs:
      cooldown_seconds:
        description: Seconds to wait for hot main to settle before translating.
        required: true
        default: "0"
        type: string
      target_locale:
        description: Locale slug to rerun, or all.
        required: true
        default: "all"
        type: choice
        options:
          - all
          - zh-cn
          - zh-tw
          - ja-jp
          - es
          - pt-br
          - ko
          - de
          - fr
          - hi
          - ar
          - it
          - vi
          - nl
          - fa
          - ru
          - tr
          - uk
          - id
          - pl
          - th
      canary_only:
        description: Run only the canary translation, publish, and live smoke.
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: write

concurrency:
  group: docs-i18n-full
  cancel-in-progress: false

jobs:
  validate-workflow-shell:
    name: Validate workflow shell blocks
    uses: ./.github/workflows/translate-shell-check-reusable.yml

  prepare:
    name: Debounce and pick source
    needs: validate-workflow-shell
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.prepare.outputs.mode }}
      publish_ref: ${{ steps.prepare.outputs.publish_ref }}
      should_translate: ${{ steps.prepare.outputs.should_translate }}
      source_repository: ${{ steps.prepare.outputs.source_repository }}
      source_sha: ${{ steps.prepare.outputs.source_sha }}
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Debounce main
        id: prepare
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_COOLDOWN_SECONDS: ${{ inputs.cooldown_seconds || '' }}
          DEFAULT_COOLDOWN_SECONDS: ${{ vars.OPENCLAW_DOCS_TRANSLATION_COOLDOWN_SECONDS || '3600' }}
          DEFAULT_MAX_WAIT_SECONDS: ${{ vars.OPENCLAW_DOCS_TRANSLATION_MAX_WAIT_SECONDS || vars.OPENCLAW_DOCS_TRANSLATION_COOLDOWN_SECONDS || '3600' }}
        run: |
          set -euo pipefail

          python .github/scripts/i18n/prepare.py --mode full --title "Translate Full"

  plan:
    name: Plan full locale batches
    needs: prepare
    if: needs.prepare.outputs.should_translate == 'true'
    runs-on: ubuntu-latest
    outputs:
      locale_count: ${{ steps.plan.outputs.locale_count }}
      canary_locale: ${{ steps.plan.outputs.canary_locale }}
      canary_locale_slug: ${{ steps.plan.outputs.canary_locale_slug }}
      selected_locales: ${{ steps.plan.outputs.selected_locales }}
      source_doc_count: ${{ steps.plan.outputs.source_doc_count }}
      shard_total: ${{ steps.plan.outputs.shard_total }}
      batch_1_count: ${{ steps.plan.outputs.batch_1_count }}
      batch_1: ${{ steps.plan.outputs.batch_1 }}
      batch_1_locales: ${{ steps.plan.outputs.batch_1_locales }}
      batch_2_count: ${{ steps.plan.outputs.batch_2_count }}
      batch_2: ${{ steps.plan.outputs.batch_2 }}
      batch_2_locales: ${{ steps.plan.outputs.batch_2_locales }}
      batch_3_count: ${{ steps.plan.outputs.batch_3_count }}
      batch_3: ${{ steps.plan.outputs.batch_3 }}
      batch_3_locales: ${{ steps.plan.outputs.batch_3_locales }}
      batch_4_count: ${{ steps.plan.outputs.batch_4_count }}
      batch_4: ${{ steps.plan.outputs.batch_4 }}
      batch_4_locales: ${{ steps.plan.outputs.batch_4_locales }}
      batch_5_count: ${{ steps.plan.outputs.batch_5_count }}
      batch_5: ${{ steps.plan.outputs.batch_5 }}
      batch_5_locales: ${{ steps.plan.outputs.batch_5_locales }}
      batch_6_count: ${{ steps.plan.outputs.batch_6_count }}
      batch_6: ${{ steps.plan.outputs.batch_6 }}
      batch_6_locales: ${{ steps.plan.outputs.batch_6_locales }}
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Build full locale plan
        id: plan
        env:
          TARGET_LOCALE: ${{ inputs.target_locale || 'all' }}
        run: |
          set -euo pipefail

          python .github/scripts/i18n/plan_full.py --batch-size 4

  provider-preflight:
    name: Check translation provider
    needs:
      - prepare
      - plan
    if: needs.prepare.outputs.should_translate == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Validate OpenAI key and model
        env:
          OPENAI_API_KEY: ${{ secrets.OPENCLAW_DOCS_I18N_OPENAI_API_KEY }}
          OPENCLAW_DOCS_I18N_PROVIDER: openai
          OPENCLAW_DOCS_I18N_MODEL: gpt-5.5
        run: |
          set -euo pipefail

          python .github/scripts/i18n/provider_preflight.py

  translate-canary:
    name: Canary ${{ needs.plan.outputs.canary_locale }}
    needs:
      - prepare
      - plan
      - provider-preflight
    if: needs.prepare.outputs.should_translate == 'true'
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: ${{ needs.plan.outputs.canary_locale }}
      locale_slug: ${{ needs.plan.outputs.canary_locale_slug }}
      publish_ref: ${{ needs.prepare.outputs.publish_ref }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_index: "0"
      shard_total: "1"
      worker_parallel: "3"
      thinking_effort: "medium"
      pending_limit: "1"
      canary_source_path: channels/line.md
      canary_live_path: channels/line
      canary_expected_h1: LINE
      artifact_prefix: i18n-canary
      artifact_role: canary
      commit_locale: true
    secrets: inherit

  translate-batch-1:
    name: Full batch 1
    needs:
      - prepare
      - plan
      - translate-canary
    if: always() && needs.prepare.outputs.should_translate == 'true' && needs.translate-canary.result == 'success' && inputs.canary_only != true && needs.plan.outputs.batch_1_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.plan.outputs.batch_1) }}
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      publish_ref: ${{ needs.prepare.outputs.publish_ref }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_index: ${{ matrix.shard_index }}
      shard_total: ${{ matrix.shard_total }}
      worker_parallel: "3"
      thinking_effort: "medium"
      pending_limit: "0"
      artifact_prefix: i18n
      artifact_role: locale
      commit_locale: false
    secrets: inherit

  finalize-batch-1:
    name: Finalize full batch 1
    needs:
      - prepare
      - plan
      - translate-batch-1
    if: always() && needs.prepare.outputs.should_translate == 'true' && needs.translate-batch-1.result == 'success' && inputs.canary_only != true && needs.plan.outputs.batch_1_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.plan.outputs.batch_1_locales) }}
    uses: ./.github/workflows/translate-locale-finalize-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_total: ${{ matrix.shard_total }}
      artifact_prefix: i18n
    secrets: inherit

  translate-batch-2:
    name: Full batch 2
    needs:
      - prepare
      - plan
      - translate-canary
      - translate-batch-1
      - finalize-batch-1
    if: always() && needs.prepare.outputs.should_translate == 'true' && needs.translate-canary.result == 'success' && needs.finalize-batch-1.result == 'success' && inputs.canary_only != true && needs.plan.outputs.batch_2_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.plan.outputs.batch_2) }}
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      publish_ref: ${{ needs.prepare.outputs.publish_ref }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_index: ${{ matrix.shard_index }}
      shard_total: ${{ matrix.shard_total }}
      worker_parallel: "3"
      thinking_effort: "medium"
      pending_limit: "0"
      artifact_prefix: i18n
      artifact_role: locale
      commit_locale: false
    secrets: inherit

  finalize-batch-2:
    name: Finalize full batch 2
    needs:
      - prepare
      - plan
      - translate-batch-2
    if: always() && needs.prepare.outputs.should_translate == 'true' && needs.translate-batch-2.result == 'success' && inputs.canary_only != true && needs.plan.outputs.batch_2_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.plan.outputs.batch_2_locales) }}
    uses: ./.github/workflows/translate-locale-finalize-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_total: ${{ matrix.shard_total }}
      artifact_prefix: i18n
    secrets: inherit

  translate-batch-3:
    name: Full batch 3
    needs:
      - prepare
      - plan
      - translate-canary
      - translate-batch-2
      - finalize-batch-2
    if: always() && needs.prepare.outputs.should_translate == 'true' && needs.translate-canary.result == 'success' && needs.finalize-batch-2.result == 'success' && inputs.canary_only != true && needs.plan.outputs.batch_3_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.plan.outputs.batch_3) }}
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      publish_ref: ${{ needs.prepare.outputs.publish_ref }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_index: ${{ matrix.shard_index }}
      shard_total: ${{ matrix.shard_total }}
      worker_parallel: "3"
      thinking_effort: "medium"
      pending_limit: "0"
      artifact_prefix: i18n
      artifact_role: locale
      commit_locale: false
    secrets: inherit

  finalize-batch-3:
    name: Finalize full batch 3
    needs:
      - prepare
      - plan
      - translate-batch-3
    if: always() && needs.prepare.outputs.should_translate == 'true' && needs.translate-batch-3.result == 'success' && inputs.canary_only != true && needs.plan.outputs.batch_3_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.plan.outputs.batch_3_locales) }}
    uses: ./.github/workflows/translate-locale-finalize-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_total: ${{ matrix.shard_total }}
      artifact_prefix: i18n
    secrets: inherit

  translate-batch-4:
    name: Full batch 4
    needs:
      - prepare
      - plan
      - translate-canary
      - translate-batch-3
      - finalize-batch-3
    if: always() && needs.prepare.outputs.should_translate == 'true' && needs.translate-canary.result == 'success' && needs.finalize-batch-3.result == 'success' && inputs.canary_only != true && needs.plan.outputs.batch_4_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.plan.outputs.batch_4) }}
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      publish_ref: ${{ needs.prepare.outputs.publish_ref }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_index: ${{ matrix.shard_index }}
      shard_total: ${{ matrix.shard_total }}
      worker_parallel: "3"
      thinking_effort: "medium"
      pending_limit: "0"
      artifact_prefix: i18n
      artifact_role: locale
      commit_locale: false
    secrets: inherit

  finalize-batch-4:
    name: Finalize full batch 4
    needs:
      - prepare
      - plan
      - translate-batch-4
    if: always() && needs.prepare.outputs.should_translate == 'true' && needs.translate-batch-4.result == 'success' && inputs.canary_only != true && needs.plan.outputs.batch_4_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.plan.outputs.batch_4_locales) }}
    uses: ./.github/workflows/translate-locale-finalize-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_total: ${{ matrix.shard_total }}
      artifact_prefix: i18n
    secrets: inherit

  translate-batch-5:
    name: Full batch 5
    needs:
      - prepare
      - plan
      - translate-canary
      - translate-batch-4
      - finalize-batch-4
    if: always() && needs.prepare.outputs.should_translate == 'true' && needs.translate-canary.result == 'success' && needs.finalize-batch-4.result == 'success' && inputs.canary_only != true && needs.plan.outputs.batch_5_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.plan.outputs.batch_5) }}
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      publish_ref: ${{ needs.prepare.outputs.publish_ref }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_index: ${{ matrix.shard_index }}
      shard_total: ${{ matrix.shard_total }}
      worker_parallel: "3"
      thinking_effort: "medium"
      pending_limit: "0"
      artifact_prefix: i18n
      artifact_role: locale
      commit_locale: false
    secrets: inherit

  finalize-batch-5:
    name: Finalize full batch 5
    needs:
      - prepare
      - plan
      - translate-batch-5
    if: always() && needs.prepare.outputs.should_translate == 'true' && needs.translate-batch-5.result == 'success' && inputs.canary_only != true && needs.plan.outputs.batch_5_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.plan.outputs.batch_5_locales) }}
    uses: ./.github/workflows/translate-locale-finalize-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_total: ${{ matrix.shard_total }}
      artifact_prefix: i18n
    secrets: inherit

  translate-batch-6:
    name: Full batch 6
    needs:
      - prepare
      - plan
      - translate-canary
      - translate-batch-5
      - finalize-batch-5
    if: always() && needs.prepare.outputs.should_translate == 'true' && needs.translate-canary.result == 'success' && needs.finalize-batch-5.result == 'success' && inputs.canary_only != true && needs.plan.outputs.batch_6_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.plan.outputs.batch_6) }}
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      publish_ref: ${{ needs.prepare.outputs.publish_ref }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_index: ${{ matrix.shard_index }}
      shard_total: ${{ matrix.shard_total }}
      worker_parallel: "3"
      thinking_effort: "medium"
      pending_limit: "0"
      artifact_prefix: i18n
      artifact_role: locale
      commit_locale: false
    secrets: inherit

  finalize-batch-6:
    name: Finalize full batch 6
    needs:
      - prepare
      - plan
      - translate-batch-6
    if: always() && needs.prepare.outputs.should_translate == 'true' && needs.translate-batch-6.result == 'success' && inputs.canary_only != true && needs.plan.outputs.batch_6_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.plan.outputs.batch_6_locales) }}
    uses: ./.github/workflows/translate-locale-finalize-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_total: ${{ matrix.shard_total }}
      artifact_prefix: i18n
    secrets: inherit

  full-status:
    name: Report full translation status
    needs:
      - prepare
      - plan
      - provider-preflight
      - translate-canary
      - translate-batch-1
      - translate-batch-2
      - translate-batch-3
      - translate-batch-4
      - translate-batch-5
      - translate-batch-6
      - finalize-batch-1
      - finalize-batch-2
      - finalize-batch-3
      - finalize-batch-4
      - finalize-batch-5
      - finalize-batch-6
    if: always() && needs.prepare.outputs.should_translate == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Download full locale artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: i18n-*-${{ needs.prepare.outputs.source_sha }}
          path: .openclaw-sync/i18n-artifacts

      - name: Summarize full run
        env:
          SELECTED_LOCALES: ${{ needs.plan.outputs.selected_locales }}
          LOCALE_COUNT: ${{ needs.plan.outputs.locale_count }}
          CANARY_ONLY: ${{ inputs.canary_only || false }}
          PROVIDER_RESULT: ${{ needs.provider-preflight.result }}
          CANARY_RESULT: ${{ needs.translate-canary.result }}
          BATCH_1_RESULT: ${{ needs.translate-batch-1.result }}
          BATCH_2_RESULT: ${{ needs.translate-batch-2.result }}
          BATCH_3_RESULT: ${{ needs.translate-batch-3.result }}
          BATCH_4_RESULT: ${{ needs.translate-batch-4.result }}
          BATCH_5_RESULT: ${{ needs.translate-batch-5.result }}
          BATCH_6_RESULT: ${{ needs.translate-batch-6.result }}
          FINALIZE_1_RESULT: ${{ needs.finalize-batch-1.result }}
          FINALIZE_2_RESULT: ${{ needs.finalize-batch-2.result }}
          FINALIZE_3_RESULT: ${{ needs.finalize-batch-3.result }}
          FINALIZE_4_RESULT: ${{ needs.finalize-batch-4.result }}
          FINALIZE_5_RESULT: ${{ needs.finalize-batch-5.result }}
          FINALIZE_6_RESULT: ${{ needs.finalize-batch-6.result }}
        run: |
          set -euo pipefail

          {
            echo "### Translate Full status"
            echo
            echo "- selected locales: \`${SELECTED_LOCALES}\`"
            echo "- locale count: \`${LOCALE_COUNT}\`"
            echo "- canary only: \`${CANARY_ONLY}\`"
            echo "- provider preflight: \`${PROVIDER_RESULT}\`"
            echo "- canary: \`${CANARY_RESULT}\`"
            echo "- batch 1: \`${BATCH_1_RESULT}\`"
            echo "- batch 2: \`${BATCH_2_RESULT}\`"
            echo "- batch 3: \`${BATCH_3_RESULT}\`"
            echo "- batch 4: \`${BATCH_4_RESULT}\`"
            echo "- batch 5: \`${BATCH_5_RESULT}\`"
            echo "- batch 6: \`${BATCH_6_RESULT}\`"
            echo "- finalize batch 1: \`${FINALIZE_1_RESULT}\`"
            echo "- finalize batch 2: \`${FINALIZE_2_RESULT}\`"
            echo "- finalize batch 3: \`${FINALIZE_3_RESULT}\`"
            echo "- finalize batch 4: \`${FINALIZE_4_RESULT}\`"
            echo "- finalize batch 5: \`${FINALIZE_5_RESULT}\`"
            echo "- finalize batch 6: \`${FINALIZE_6_RESULT}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          python .github/scripts/i18n/summarize_full.py \
            --selected-locales "${SELECTED_LOCALES}" \
            --provider-result "${PROVIDER_RESULT}" \
            --canary-result "${CANARY_RESULT}"

          for result in \
            "${PROVIDER_RESULT}" "${CANARY_RESULT}" \
            "${BATCH_1_RESULT}" "${BATCH_2_RESULT}" "${BATCH_3_RESULT}" "${BATCH_4_RESULT}" "${BATCH_5_RESULT}" "${BATCH_6_RESULT}" \
            "${FINALIZE_1_RESULT}" "${FINALIZE_2_RESULT}" "${FINALIZE_3_RESULT}" "${FINALIZE_4_RESULT}" "${FINALIZE_5_RESULT}" "${FINALIZE_6_RESULT}"; do
            case "${result}" in
              success|skipped)
                ;;
              *)
                echo "Translate Full completed with failed or cancelled work: ${result}" >&2
                exit 1
                ;;
            esac
          done
