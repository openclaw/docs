name: Translate zh-CN

on:
  push:
    branches:
      - main
    paths-ignore:
      - docs/zh-CN/**
      - docs/.i18n/zh-CN.tm.jsonl
  schedule:
    - cron: "17 * * * *"
  repository_dispatch:
    types:
      - translate-zh-cn-release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: zh-CN
      locale_slug: zh-cn
    secrets: inherit
