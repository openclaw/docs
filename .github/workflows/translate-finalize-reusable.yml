name: Translate Finalize Reusable

on:
  workflow_call:
    inputs:
      source_sha:
        required: true
        type: string
      mode:
        required: true
        type: string
      shard_total:
        required: true
        type: string
      expected_locales:
        required: false
        default: zh-cn=zh-CN zh-tw=zh-TW ja-jp=ja-JP es=es pt-br=pt-BR ko=ko de=de fr=fr hi=hi ar=ar it=it vi=vi nl=nl fa=fa ru=ru tr=tr uk=uk id=id pl=pl th=th
        type: string

permissions:
  actions: write
  contents: write

jobs:
  finalize:
    name: Commit successful locale artifacts
    runs-on: ubuntu-latest
    concurrency:
      group: docs-i18n-finalize
      cancel-in-progress: false
    steps:
      # The artifact commit targets latest main, while the workflow control
      # scripts stay pinned to the workflow ref under test.
      - name: Check out workflow scripts
        uses: actions/checkout@v7
        with:
          ref: ${{ github.workflow_sha }}
          path: .openclaw-sync/workflow-ref
          sparse-checkout: .github/scripts/i18n
          persist-credentials: false

      - name: Stage workflow scripts
        run: |
          set -euo pipefail
          I18N_SCRIPT_DIR="${RUNNER_TEMP}/openclaw-i18n-scripts"
          echo "I18N_SCRIPT_DIR=${I18N_SCRIPT_DIR}" >> "$GITHUB_ENV"
          mkdir -p "${I18N_SCRIPT_DIR}"
          cp -R .openclaw-sync/workflow-ref/.github/scripts/i18n/. "${I18N_SCRIPT_DIR}/"

      - name: Check out latest main
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download locale artifacts
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: i18n-*-${{ inputs.source_sha }}
          path: .openclaw-sync/i18n-artifacts

      - name: Apply locale artifacts
        id: apply
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          MODE: ${{ inputs.mode }}
          SHARD_TOTAL: ${{ inputs.shard_total }}
          EXPECTED_LOCALES: ${{ inputs.expected_locales }}
        run: |
          set -euo pipefail
          python "${I18N_SCRIPT_DIR}/apply_artifacts.py" \
            --source-sha "${SOURCE_SHA}" \
            --mode "${MODE}" \
            --shard-total "${SHARD_TOTAL}" \
            --expected-locales "${EXPECTED_LOCALES}"

      - name: Set up Node
        if: steps.apply.outputs.changed_count != '0'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        if: steps.apply.outputs.changed_count != '0'
        run: npm ci

      - name: Install librsvg2-bin
        if: steps.apply.outputs.changed_count != '0'
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Install Playwright browser
        if: steps.apply.outputs.changed_count != '0'
        run: npx playwright install --with-deps chromium

      - name: Check aggregate docs
        if: steps.apply.outputs.changed_count != '0'
        run: npm run docs:check

      - name: Commit aggregate translation refresh
        if: steps.apply.outputs.changed_count != '0'
        env:
          BASE_SOURCE_SHA: ${{ steps.apply.outputs.base_source_sha }}
        run: |
          set -euo pipefail

          remote_source_sha() {
            git show refs/remotes/origin/main:.openclaw-sync/source.json 2>/dev/null \
              | node -e 'const fs = require("node:fs"); try { const data = JSON.parse(fs.readFileSync(0, "utf8")); if (data.sha) process.stdout.write(data.sha); } catch {}' \
              || true
          }

          ensure_base_current() {
            current_source_sha="$(remote_source_sha)"
            if [ -n "${current_source_sha}" ] && [ "${current_source_sha}" != "${BASE_SOURCE_SHA}" ]; then
              echo "Source moved from ${BASE_SOURCE_SHA} to ${current_source_sha}; skipping aggregate translation commit."
              exit 0
            fi
          }

          git config user.name "openclaw-docs-i18n[bot]"
          git config user.email "openclaw-docs-i18n[bot]@users.noreply.github.com"
          git add docs
          git commit -m "chore(i18n): refresh translations"

          for attempt in 1 2 3 4 5; do
            if git fetch origin main:refs/remotes/origin/main; then
              ensure_base_current
              if git rebase origin/main; then
                ensure_base_current
                if git push origin HEAD:main; then
                  exit 0
                fi
              fi
              git rebase --abort >/dev/null 2>&1 || true
            fi
            echo "Aggregate translation push attempt ${attempt} failed; retrying."
            sleep $((attempt * 2))
          done

          echo "Failed to push aggregate translations after retries."
          exit 1

      - name: Dispatch aggregate docs deploy
        if: steps.apply.outputs.changed_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python "${I18N_SCRIPT_DIR}/dispatch_r2_pages.py"

      - name: Fail incomplete translation run
        if: steps.apply.outputs.stale != 'true' && steps.apply.outputs.incomplete_count != '0'
        run: |
          {
            echo "Translation finished with missing or failed locale artifacts."
            echo "Successful locale shard artifacts were applied before this failure when available."
            cat .openclaw-sync/i18n-incomplete-locales.txt
          } >&2
          exit 1
