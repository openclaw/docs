name: Translate Shell Check Reusable

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    name: Check workflow shell blocks
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7.0.1

      - name: Check bash syntax in translation workflows
        run: |
          set -euo pipefail

          python .github/scripts/i18n/workflow_shell_check.py --check-bash

      - name: Install i18n MDX checker dependency
        run: npm install --no-save --package-lock=false @mdx-js/mdx@3.1.1

      - name: Run i18n control-plane regressions
        run: |
          set -euo pipefail

          python .github/scripts/i18n/tests/test_i18n_scripts.py

      - name: Check translation workflow budgets
        run: |
          set -euo pipefail

          python .github/scripts/i18n/budget_check.py
