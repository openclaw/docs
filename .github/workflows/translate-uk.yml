name: Translate uk

on:
  push:
    branches:
      - main
    paths-ignore:
      - docs/uk/**
      - docs/.i18n/uk.tm.jsonl
  schedule:
    - cron: "29 * * * *"
  repository_dispatch:
    types:
      - translate-uk-release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: uk
      locale_slug: uk
    secrets: inherit
