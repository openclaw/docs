name: Translate Incremental

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "!docs/ar/**"
      - "!docs/de/**"
      - "!docs/es/**"
      - "!docs/fa/**"
      - "!docs/fr/**"
      - "!docs/id/**"
      - "!docs/it/**"
      - "!docs/ja-JP/**"
      - "!docs/ko/**"
      - "!docs/nl/**"
      - "!docs/pl/**"
      - "!docs/pt-BR/**"
      - "!docs/th/**"
      - "!docs/tr/**"
      - "!docs/uk/**"
      - "!docs/vi/**"
      - "!docs/zh-CN/**"
      - "!docs/zh-TW/**"
      - "!docs/.i18n/**"
  workflow_dispatch:
    inputs:
      cooldown_seconds:
        description: Seconds to wait for hot main to settle before translating.
        required: true
        default: "0"
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: docs-i18n-incremental
  cancel-in-progress: true

jobs:
  validate-workflow-shell:
    name: Validate workflow shell blocks
    uses: ./.github/workflows/translate-shell-check-reusable.yml

  prepare:
    name: Debounce and pick source
    needs: validate-workflow-shell
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.prepare.outputs.mode }}
      publish_ref: ${{ steps.prepare.outputs.publish_ref }}
      should_translate: ${{ steps.prepare.outputs.should_translate }}
      source_repository: ${{ steps.prepare.outputs.source_repository }}
      source_sha: ${{ steps.prepare.outputs.source_sha }}
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Debounce main
        id: prepare
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          REQUESTED_COOLDOWN_SECONDS: ${{ inputs.cooldown_seconds || '' }}
          DEFAULT_COOLDOWN_SECONDS: ${{ vars.OPENCLAW_DOCS_TRANSLATION_COOLDOWN_SECONDS || '3600' }}
          DEFAULT_MAX_WAIT_SECONDS: ${{ vars.OPENCLAW_DOCS_TRANSLATION_MAX_WAIT_SECONDS || vars.OPENCLAW_DOCS_TRANSLATION_COOLDOWN_SECONDS || '3600' }}
        run: |
          set -euo pipefail

          python .github/scripts/i18n/prepare.py --mode incremental --title "Translate Incremental"

  translate:
    name: Translate ${{ matrix.locale }}
    needs:
      - prepare
      - provider-preflight
    if: needs.prepare.outputs.should_translate == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - locale: zh-CN
            locale_slug: zh-cn
          - locale: zh-TW
            locale_slug: zh-tw
          - locale: ja-JP
            locale_slug: ja-jp
          - locale: es
            locale_slug: es
          - locale: pt-BR
            locale_slug: pt-br
          - locale: ko
            locale_slug: ko
          - locale: de
            locale_slug: de
          - locale: fr
            locale_slug: fr
          - locale: ar
            locale_slug: ar
          - locale: it
            locale_slug: it
          - locale: vi
            locale_slug: vi
          - locale: nl
            locale_slug: nl
          - locale: fa
            locale_slug: fa
          - locale: tr
            locale_slug: tr
          - locale: uk
            locale_slug: uk
          - locale: id
            locale_slug: id
          - locale: pl
            locale_slug: pl
          - locale: th
            locale_slug: th
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      publish_ref: ${{ needs.prepare.outputs.publish_ref }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_index: "0"
      shard_total: "1"
      worker_parallel: "8"
      thinking_effort: "medium"
      pending_limit: "0"
      artifact_prefix: i18n
      artifact_role: locale
      commit_locale: false
    secrets: inherit

  provider-preflight:
    name: Check translation provider
    needs: prepare
    if: needs.prepare.outputs.should_translate == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Validate OpenAI key and model
        env:
          OPENAI_API_KEY: ${{ secrets.OPENCLAW_DOCS_I18N_OPENAI_API_KEY }}
          OPENCLAW_DOCS_I18N_PROVIDER: openai
          OPENCLAW_DOCS_I18N_MODEL: gpt-5.5
        run: |
          set -euo pipefail

          python .github/scripts/i18n/provider_preflight.py

  finalize:
    name: Commit successful locale artifacts
    needs:
      - prepare
      - provider-preflight
      - translate
    if: always() && needs.prepare.result == 'success' && needs.provider-preflight.result == 'success' && needs.prepare.outputs.should_translate == 'true'
    uses: ./.github/workflows/translate-finalize-reusable.yml
    with:
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_total: "1"
