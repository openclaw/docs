name: Translate Incremental

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "!docs/ar/**"
      - "!docs/de/**"
      - "!docs/es/**"
      - "!docs/fa/**"
      - "!docs/fr/**"
      - "!docs/hi/**"
      - "!docs/id/**"
      - "!docs/it/**"
      - "!docs/ja-JP/**"
      - "!docs/ko/**"
      - "!docs/nl/**"
      - "!docs/pl/**"
      - "!docs/pt-BR/**"
      - "!docs/ru/**"
      - "!docs/th/**"
      - "!docs/tr/**"
      - "!docs/uk/**"
      - "!docs/vi/**"
      - "!docs/zh-CN/**"
      - "!docs/zh-TW/**"
      - "!docs/.i18n/**"
  workflow_dispatch:
    inputs:
      cooldown_seconds:
        description: Seconds to wait for hot main to settle before translating.
        required: true
        default: "0"
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: docs-i18n-incremental
  cancel-in-progress: true

jobs:
  validate-workflow-shell:
    name: Validate workflow shell blocks
    uses: ./.github/workflows/translate-shell-check-reusable.yml

  prepare:
    name: Debounce and pick source
    needs: validate-workflow-shell
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.prepare.outputs.mode }}
      publish_ref: ${{ steps.prepare.outputs.publish_ref }}
      should_translate: ${{ steps.prepare.outputs.should_translate }}
      source_repository: ${{ steps.prepare.outputs.source_repository }}
      source_sha: ${{ steps.prepare.outputs.source_sha }}
    steps:
      - name: Check out
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Debounce main
        id: prepare
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          REQUESTED_COOLDOWN_SECONDS: ${{ inputs.cooldown_seconds || '' }}
          DEFAULT_COOLDOWN_SECONDS: ${{ vars.OPENCLAW_DOCS_TRANSLATION_COOLDOWN_SECONDS || '3600' }}
          DEFAULT_MAX_WAIT_SECONDS: ${{ vars.OPENCLAW_DOCS_TRANSLATION_MAX_WAIT_SECONDS || vars.OPENCLAW_DOCS_TRANSLATION_COOLDOWN_SECONDS || '3600' }}
        run: |
          set -euo pipefail

          python .github/scripts/i18n/prepare.py --mode incremental --title "Translate Incremental"

  plan:
    name: Plan incremental shards
    needs: prepare
    if: needs.prepare.outputs.should_translate == 'true'
    runs-on: ubuntu-latest
    outputs:
      locale_count: ${{ steps.plan.outputs.locale_count }}
      source_doc_count: ${{ steps.plan.outputs.source_doc_count }}
      shard_total: ${{ steps.plan.outputs.shard_total }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      # The planner runs workflow-control scripts from the workflow ref under
      # test, while sizing shards from the debounced publish ref.
      - name: Check out workflow scripts
        uses: actions/checkout@v7
        with:
          ref: ${{ github.workflow_sha }}
          path: .openclaw-sync/workflow-ref
          sparse-checkout: .github/scripts/i18n
          persist-credentials: false

      - name: Stage workflow scripts
        run: |
          set -euo pipefail
          I18N_SCRIPT_DIR="${RUNNER_TEMP}/openclaw-i18n-scripts"
          echo "I18N_SCRIPT_DIR=${I18N_SCRIPT_DIR}" >> "$GITHUB_ENV"
          mkdir -p "${I18N_SCRIPT_DIR}"
          cp -R .openclaw-sync/workflow-ref/.github/scripts/i18n/. "${I18N_SCRIPT_DIR}/"

      - name: Check out publish ref
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.publish_ref }}
          persist-credentials: false

      - name: Build incremental shard matrix
        id: plan
        run: |
          set -euo pipefail
          python "${I18N_SCRIPT_DIR}/plan_incremental.py"

  translate:
    name: Translate ${{ matrix.locale }}
    needs:
      - prepare
      - provider-preflight
      - plan
    if: needs.prepare.outputs.should_translate == 'true'
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: ${{ matrix.locale }}
      locale_slug: ${{ matrix.locale_slug }}
      publish_ref: ${{ needs.prepare.outputs.publish_ref }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_index: ${{ matrix.shard_index }}
      shard_total: ${{ matrix.shard_total }}
      worker_parallel: "3"
      thinking_effort: "xhigh"
      pending_limit: "0"
      artifact_prefix: i18n
      artifact_role: locale
      commit_locale: false
    secrets: inherit

  provider-preflight:
    name: Check translation provider
    needs: prepare
    if: needs.prepare.outputs.should_translate == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Validate OpenAI key and model
        env:
          OPENAI_API_KEY: ${{ secrets.OPENCLAW_DOCS_I18N_OPENAI_API_KEY }}
          OPENCLAW_DOCS_I18N_PROVIDER: openai
          OPENCLAW_DOCS_I18N_MODEL: gpt-5.6
        run: |
          set -euo pipefail

          python .github/scripts/i18n/provider_preflight.py

  finalize:
    name: Commit successful locale artifacts
    needs:
      - prepare
      - provider-preflight
      - plan
      - translate
    if: always() && needs.prepare.result == 'success' && needs.provider-preflight.result == 'success' && needs.plan.result == 'success' && needs.prepare.outputs.should_translate == 'true'
    uses: ./.github/workflows/translate-finalize-reusable.yml
    with:
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      mode: ${{ needs.prepare.outputs.mode }}
      shard_total: ${{ needs.plan.outputs.shard_total }}
