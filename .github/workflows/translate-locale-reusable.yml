name: Translate Locale Reusable

on:
  workflow_call:
    inputs:
      locale:
        required: true
        type: string
      locale_slug:
        required: true
        type: string
      publish_ref:
        required: true
        type: string
      source_sha:
        required: true
        type: string
      mode:
        required: true
        type: string
      shard_index:
        required: true
        type: string
      shard_total:
        required: true
        type: string
      worker_parallel:
        required: true
        type: string
      thinking_effort:
        required: true
        type: string
      pending_limit:
        required: false
        default: "0"
        type: string
      canary_source_path:
        required: false
        default: ""
        type: string
      artifact_prefix:
        required: false
        default: i18n
        type: string
      artifact_role:
        required: false
        default: locale
        type: string
      commit_locale:
        required: false
        default: false
        type: boolean
      canary_live_path:
        required: false
        default: channels/line
        type: string
      canary_expected_h1:
        required: false
        default: LINE
        type: string
      canary_publish_required:
        required: false
        default: false
        type: boolean

jobs:
  translate:
    name: Translate ${{ inputs.locale }} shard ${{ inputs.shard_index }}/${{ inputs.shard_total }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    concurrency:
      group: translate-${{ inputs.locale_slug }}-s${{ inputs.shard_index }}of${{ inputs.shard_total }}
      cancel-in-progress: false
    steps:
      # Keep workflow control-plane scripts pinned to the workflow ref. The docs
      # content checkout below may intentionally point at latest main.
      - name: Check out workflow scripts
        uses: actions/checkout@v7
        with:
          ref: ${{ github.workflow_sha }}
          path: .openclaw-sync/workflow-ref
          sparse-checkout: .github/scripts/i18n
          persist-credentials: false

      - name: Stage workflow scripts
        run: |
          set -euo pipefail
          I18N_SCRIPT_DIR="${RUNNER_TEMP}/openclaw-i18n-scripts"
          echo "I18N_SCRIPT_DIR=${I18N_SCRIPT_DIR}" >> "$GITHUB_ENV"
          mkdir -p "${I18N_SCRIPT_DIR}"
          cp -R .openclaw-sync/workflow-ref/.github/scripts/i18n/. "${I18N_SCRIPT_DIR}/"

      - name: Checkout publish repo
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.publish_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Read source metadata
        id: meta
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          python "${I18N_SCRIPT_DIR}/read_source_metadata.py"

      - name: Allow requested source
        id: stale
        run: |
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout source repo
        if: steps.stale.outputs.skip != 'true'
        uses: actions/checkout@v7
        with:
          repository: ${{ steps.meta.outputs.repository }}
          ref: ${{ steps.meta.outputs.sha }}
          path: source
          fetch-depth: 1

      - name: Setup Node
        if: steps.stale.outputs.skip != 'true'
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Setup Go
        if: steps.stale.outputs.skip != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install Codex CLI
        if: steps.stale.outputs.skip != 'true'
        run: npm install -g @openai/codex@0.144.4

      - name: Prune stale locale pages
        if: steps.stale.outputs.skip != 'true'
        env:
          LOCALE: ${{ inputs.locale }}
        run: |
          python "${I18N_SCRIPT_DIR}/prune_stale_locale_pages.py"

      - name: Build pending docs file list
        id: pending
        if: steps.stale.outputs.skip != 'true'
        env:
          LOCALE: ${{ inputs.locale }}
          LOCALE_SLUG: ${{ inputs.locale_slug }}
          MODE: ${{ inputs.mode }}
          SHARD_INDEX: ${{ inputs.shard_index }}
          SHARD_TOTAL: ${{ inputs.shard_total }}
          PENDING_LIMIT: ${{ inputs.pending_limit }}
          CANARY_SOURCE_PATH: ${{ inputs.canary_source_path }}
        run: |
          python "${I18N_SCRIPT_DIR}/build_pending_manifest.py"

      - name: Translate changed docs into locale
        id: translate_docs
        if: steps.stale.outputs.skip != 'true' && steps.pending.outputs.pending_count != '0'
        continue-on-error: true
        env:
          LOCALE: ${{ inputs.locale }}
          LOCALE_SLUG: ${{ inputs.locale_slug }}
          MODE: ${{ inputs.mode }}
          OPENAI_API_KEY: ${{ secrets.OPENCLAW_DOCS_I18N_OPENAI_API_KEY }}
          OPENCLAW_DOCS_I18N_PROVIDER: openai
          OPENCLAW_DOCS_I18N_MODEL: gpt-5.6
          OPENCLAW_DOCS_I18N_PROMPT_TIMEOUT: 10m
          WORKER_PARALLEL: ${{ inputs.worker_parallel }}
          THINKING_EFFORT: ${{ inputs.thinking_effort }}
        run: |
          pending_file=".openclaw-sync/docs-i18n-${LOCALE_SLUG}-s${{ inputs.shard_index }}of${{ inputs.shard_total }}.txt"
          if [ ! -s "${pending_file}" ]; then
            echo "No docs files found."
            exit 0
          fi

          mapfile -t DOC_FILES < "${pending_file}"
          if [ "${MODE}" = "full" ]; then
            python "${I18N_SCRIPT_DIR}/clear_pending_locale_outputs.py" \
              --pending-file "${pending_file}" \
              --locale "${LOCALE}"
          fi

          attempt=1
          max_attempts=5
          while [ "$attempt" -le "$max_attempts" ]; do
            PARTIAL_ARGS=(--allow-partial)
            if [ "${MODE}" = "full" ] && [ "$attempt" -eq 1 ]; then
              PARTIAL_ARGS+=(--overwrite)
            fi

            echo "docs-i18n partial attempt $attempt/$max_attempts"
            if (
              cd source/scripts/docs-i18n
              go run . \
                --docs "$GITHUB_WORKSPACE/docs" \
                --lang "${LOCALE}" \
                --src en \
                --mode doc \
                --thinking "${THINKING_EFFORT}" \
                --parallel "${WORKER_PARALLEL}" \
                "${PARTIAL_ARGS[@]}" \
                "${DOC_FILES[@]}"
            ); then
              if [ "${MODE}" != "full" ]; then
                exit 0
              fi
            fi

            if [ "${MODE}" = "full" ]; then
              echo "docs-i18n strict completion check $attempt/$max_attempts"
              if (
                cd source/scripts/docs-i18n
                go run . \
                  --docs "$GITHUB_WORKSPACE/docs" \
                  --lang "${LOCALE}" \
                  --src en \
                  --mode doc \
                  --thinking "${THINKING_EFFORT}" \
                  --parallel "${WORKER_PARALLEL}" \
                  "${DOC_FILES[@]}"
              ); then
                exit 0
              fi
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "docs-i18n failed after $max_attempts attempts"
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep 5
          done

      - name: Install docs MDX checker dependency
        if: steps.stale.outputs.skip != 'true' && steps.pending.outputs.pending_count != '0' && steps.translate_docs.outcome == 'success'
        run: npm install --no-save --package-lock=false @mdx-js/mdx@3.1.1

      - name: Check translated MDX
        id: mdx_check
        if: steps.stale.outputs.skip != 'true' && steps.pending.outputs.pending_count != '0' && steps.translate_docs.outcome == 'success'
        continue-on-error: true
        env:
          LOCALE: ${{ inputs.locale }}
        run: |
          mkdir -p .openclaw-sync/mdx
          node .openclaw-sync/check-docs-mdx.mjs "docs/${LOCALE}" \
            --json-out ".openclaw-sync/mdx/${LOCALE}.json"

      - name: Snapshot translated MDX repair scope
        if: steps.stale.outputs.skip != 'true' && steps.translate_docs.outcome == 'success' && steps.mdx_check.outcome == 'failure'
        env:
          LOCALE: ${{ inputs.locale }}
        run: |
          python "${I18N_SCRIPT_DIR}/mdx_repair_scope.py" snapshot \
            --baseline "${RUNNER_TEMP}/${LOCALE}.repair-baseline.txt"

      - name: Repair translated MDX
        id: mdx_repair
        if: steps.stale.outputs.skip != 'true' && steps.translate_docs.outcome == 'success' && steps.mdx_check.outcome == 'failure'
        continue-on-error: true
        uses: openai/codex-action@v1
        env:
          LOCALE: ${{ inputs.locale }}
        with:
          openai-api-key: ${{ secrets.OPENCLAW_DOCS_AGENT_OPENAI_API_KEY || secrets.OPENCLAW_DOCS_I18N_OPENAI_API_KEY }}
          prompt-file: .openclaw-sync/docs-mdx-repair.md
          model: gpt-5.6
          effort: max
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--full-auto"]'

      - name: Enforce translated MDX repair scope
        id: mdx_scope
        if: steps.stale.outputs.skip != 'true' && steps.translate_docs.outcome == 'success' && steps.mdx_check.outcome == 'failure'
        continue-on-error: true
        env:
          LOCALE: ${{ inputs.locale }}
        run: |
          python "${I18N_SCRIPT_DIR}/mdx_repair_scope.py" enforce \
            --baseline "${RUNNER_TEMP}/${LOCALE}.repair-baseline.txt"

      - name: Recheck translated MDX
        id: mdx_recheck
        if: steps.stale.outputs.skip != 'true' && steps.translate_docs.outcome == 'success' && steps.mdx_check.outcome == 'failure' && steps.mdx_repair.outcome == 'success' && steps.mdx_scope.outcome == 'success'
        continue-on-error: true
        env:
          LOCALE: ${{ inputs.locale }}
        run: |
          node .openclaw-sync/check-docs-mdx.mjs "docs/${LOCALE}" \
            --json-out ".openclaw-sync/mdx/${LOCALE}.json"

      - name: Prepare locale artifact
        id: package
        if: steps.stale.outputs.skip != 'true'
        env:
          LOCALE: ${{ inputs.locale }}
          LOCALE_SLUG: ${{ inputs.locale_slug }}
          SOURCE_SHA: ${{ steps.meta.outputs.sha }}
          MODE: ${{ inputs.mode }}
          SHARD_INDEX: ${{ inputs.shard_index }}
          SHARD_TOTAL: ${{ inputs.shard_total }}
          WORKER_PARALLEL: ${{ inputs.worker_parallel }}
          THINKING_EFFORT: ${{ inputs.thinking_effort }}
          PENDING_COUNT: ${{ steps.pending.outputs.pending_count || '0' }}
          TOTAL_PENDING_COUNT: ${{ steps.pending.outputs.total_pending_count || '0' }}
          ALL_COUNT: ${{ steps.pending.outputs.all_count || '0' }}
          TRANSLATE_OUTCOME: ${{ steps.translate_docs.outcome || 'skipped' }}
          MDX_CHECK_OUTCOME: ${{ steps.mdx_check.outcome || 'skipped' }}
          MDX_REPAIR_OUTCOME: ${{ steps.mdx_repair.outcome || 'skipped' }}
          MDX_SCOPE_OUTCOME: ${{ steps.mdx_scope.outcome || 'skipped' }}
          MDX_RECHECK_OUTCOME: ${{ steps.mdx_recheck.outcome || 'skipped' }}
          ARTIFACT_ROLE: ${{ inputs.artifact_role }}
        run: |
          set -euo pipefail

          python "${I18N_SCRIPT_DIR}/package_artifact.py"

      - name: Upload locale artifact
        if: steps.stale.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix }}-${{ inputs.locale_slug }}-s${{ inputs.shard_index }}of${{ inputs.shard_total }}-${{ inputs.source_sha }}
          path: .openclaw-sync/artifacts/${{ inputs.locale_slug }}-s${{ inputs.shard_index }}of${{ inputs.shard_total }}
          include-hidden-files: true
          retention-days: 7

      - name: Fail failed locale artifact
        if: steps.stale.outputs.skip != 'true' && steps.package.outputs.failed == 'true'
        env:
          FAILED_REASON: ${{ steps.package.outputs.failed_reason }}
        run: |
          {
            echo "Locale artifact records a failed translation."
            echo "Failure: ${FAILED_REASON}"
            echo "The artifact was uploaded before failing this job so the status and artifact contract stay aligned."
          } >&2
          exit 1

  commit-locale:
    name: Finalize ${{ inputs.locale }} artifact
    needs: translate
    if: needs.translate.result == 'success' && (inputs.commit_locale || (inputs.artifact_role == 'canary' && inputs.canary_publish_required))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: write
    steps:
      # Finalizers apply artifacts to latest main, but deploy/commit control
      # logic must come from this workflow ref so branch canaries test the fix.
      - name: Check out workflow scripts
        uses: actions/checkout@v7
        with:
          ref: ${{ github.workflow_sha }}
          path: .openclaw-sync/workflow-ref
          sparse-checkout: .github/scripts/i18n
          persist-credentials: false

      - name: Stage workflow scripts
        run: |
          set -euo pipefail
          I18N_SCRIPT_DIR="${RUNNER_TEMP}/openclaw-i18n-scripts"
          echo "I18N_SCRIPT_DIR=${I18N_SCRIPT_DIR}" >> "$GITHUB_ENV"
          mkdir -p "${I18N_SCRIPT_DIR}"
          cp -R .openclaw-sync/workflow-ref/.github/scripts/i18n/. "${I18N_SCRIPT_DIR}/"

      - name: Check out latest main
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download locale artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_prefix }}-${{ inputs.locale_slug }}-s${{ inputs.shard_index }}of${{ inputs.shard_total }}-${{ inputs.source_sha }}
          path: .openclaw-sync/i18n-artifacts/${{ inputs.locale_slug }}-s${{ inputs.shard_index }}of${{ inputs.shard_total }}

      - name: Apply locale artifact
        id: apply
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          MODE: ${{ inputs.mode }}
          SHARD_TOTAL: ${{ inputs.shard_total }}
          EXPECTED_LOCALES: ${{ inputs.locale_slug }}=${{ inputs.locale }}
        run: |
          set -euo pipefail

          python "${I18N_SCRIPT_DIR}/apply_artifacts.py" \
            --source-sha "${SOURCE_SHA}" \
            --mode "${MODE}" \
            --shard-total "${SHARD_TOTAL}" \
            --expected-locales "${EXPECTED_LOCALES}"

      - name: Set up Node for locale validation
        if: inputs.artifact_role != 'canary' && steps.apply.outputs.changed_count != '0'
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install docs dependencies
        if: inputs.artifact_role != 'canary' && steps.apply.outputs.changed_count != '0'
        run: npm ci

      - name: Install validation system dependencies
        if: inputs.artifact_role != 'canary' && steps.apply.outputs.changed_count != '0'
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Install Playwright browser
        if: inputs.artifact_role != 'canary' && steps.apply.outputs.changed_count != '0'
        run: npx playwright install --with-deps chromium

      - name: Check docs before artifact finalization
        if: inputs.artifact_role != 'canary' && steps.apply.outputs.changed_count != '0'
        run: npm run docs:check

      - name: Commit locale refresh
        id: locale_commit
        if: inputs.commit_locale && steps.apply.outputs.changed_count != '0'
        env:
          ARTIFACT_ROLE: ${{ inputs.artifact_role }}
          BASE_SOURCE_SHA: ${{ steps.apply.outputs.base_source_sha }}
          LOCALE: ${{ inputs.locale }}
          LOCALE_SLUG: ${{ inputs.locale_slug }}
          SHARD_INDEX: ${{ inputs.shard_index }}
          SHARD_TOTAL: ${{ inputs.shard_total }}
          ARTIFACT_DIR: .openclaw-sync/i18n-artifacts/${{ inputs.locale_slug }}-s${{ inputs.shard_index }}of${{ inputs.shard_total }}
        run: |
          set -euo pipefail

          python "${I18N_SCRIPT_DIR}/commit_locale_artifact.py"

      - name: Fail uncommitted locale refresh
        if: inputs.commit_locale && steps.apply.outputs.changed_count != '0' && steps.locale_commit.outputs.committed != 'true'
        run: |
          {
            echo "Locale artifact applied changes but did not commit them."
            echo "Failing so the translation status does not report an unpublished refresh as successful."
          } >&2
          exit 1

      - name: Dispatch locale docs deploy
        if: (inputs.artifact_role == 'canary' && inputs.canary_publish_required) || (inputs.commit_locale && steps.locale_commit.outputs.committed == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ROLE: ${{ inputs.artifact_role }}
          CANARY_LIVE_URL: https://docs.openclaw.ai/${{ inputs.locale }}/${{ inputs.canary_live_path }}
          CANARY_EXPECTED_H1: ${{ inputs.canary_expected_h1 }}
        run: |
          set -euo pipefail

          args=()
          if [ "${ARTIFACT_ROLE}" = "canary" ]; then
            args+=(
              --ref "${{ github.ref_name }}"
              --artifact-scope page
              --locale "${{ inputs.locale }}"
              --page-path "${{ inputs.canary_live_path }}"
              --no-force-upload
            )
            if [ "${{ inputs.canary_publish_required }}" = "true" ]; then
              args+=(
                --live-url "${CANARY_LIVE_URL}"
                --expect-h1 "${CANARY_EXPECTED_H1}"
              )
              python "${I18N_SCRIPT_DIR}/dispatch_r2_pages.py" "${args[@]}"
            elif ! python "${I18N_SCRIPT_DIR}/dispatch_r2_pages.py" "${args[@]}" --no-wait; then
              echo "::warning::Canary scoped R2 publish dispatch failed; continuing because final publication is covered by locale/full deploys."
            fi
          else
            args+=(
              --ref "${{ github.ref_name }}"
              --artifact-scope locale
              --locale "${{ inputs.locale }}"
              --no-force-upload
            )
            python "${I18N_SCRIPT_DIR}/dispatch_r2_pages.py" "${args[@]}"
          fi

      - name: Fail incomplete locale artifact
        if: steps.apply.outputs.incomplete_count != '0'
        run: |
          {
            echo "Locale finalizer found missing or failed artifact data."
            cat .openclaw-sync/i18n-incomplete-locales.txt
          } >&2
          exit 1
