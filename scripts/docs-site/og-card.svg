<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="OpenClaw documentation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0708"/>
      <stop offset="1" stop-color="#15080a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.18" r="0.85">
      <stop offset="0" stop-color="#ff5a36" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#ff5a36" stop-opacity="0.18"/>
      <stop offset="0.7" stop-color="#ff5a36" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="0.95" r="0.6">
      <stop offset="0" stop-color="#d15035" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#d15035" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5a36"/>
      <stop offset="0.6" stop-color="#ff8a5f"/>
      <stop offset="1" stop-color="#ff5a36" stop-opacity="0.2"/>
    </linearGradient>
    <symbol id="lobster" viewBox="0 0 16 16" overflow="visible">
      <g shape-rendering="crispEdges">
        <g fill="#3a0a0d">
          <rect x="1" y="5" width="1" height="3"/>
          <rect x="2" y="4" width="1" height="1"/>
          <rect x="2" y="8" width="1" height="1"/>
          <rect x="3" y="3" width="1" height="1"/>
          <rect x="3" y="9" width="1" height="1"/>
          <rect x="4" y="2" width="1" height="1"/>
          <rect x="4" y="10" width="1" height="1"/>
          <rect x="5" y="2" width="6" height="1"/>
          <rect x="11" y="2" width="1" height="1"/>
          <rect x="12" y="3" width="1" height="1"/>
          <rect x="12" y="9" width="1" height="1"/>
          <rect x="13" y="4" width="1" height="1"/>
          <rect x="13" y="8" width="1" height="1"/>
          <rect x="14" y="5" width="1" height="3"/>
          <rect x="5" y="11" width="6" height="1"/>
          <rect x="4" y="12" width="1" height="1"/>
          <rect x="11" y="12" width="1" height="1"/>
          <rect x="3" y="13" width="1" height="1"/>
          <rect x="12" y="13" width="1" height="1"/>
          <rect x="5" y="14" width="6" height="1"/>
        </g>
        <g fill="#ff4f40">
          <rect x="5" y="3" width="6" height="1"/>
          <rect x="4" y="4" width="8" height="1"/>
          <rect x="3" y="5" width="10" height="1"/>
          <rect x="3" y="6" width="10" height="1"/>
          <rect x="3" y="7" width="10" height="1"/>
          <rect x="4" y="8" width="8" height="1"/>
          <rect x="5" y="9" width="6" height="1"/>
          <rect x="5" y="12" width="6" height="1"/>
          <rect x="6" y="13" width="4" height="1"/>
        </g>
        <g fill="#ff775f">
          <rect x="1" y="6" width="2" height="1"/>
          <rect x="2" y="5" width="1" height="1"/>
          <rect x="2" y="7" width="1" height="1"/>
          <rect x="13" y="6" width="2" height="1"/>
          <rect x="13" y="5" width="1" height="1"/>
          <rect x="13" y="7" width="1" height="1"/>
        </g>
        <g fill="#081016">
          <rect x="6" y="5" width="1" height="1"/>
          <rect x="9" y="5" width="1" height="1"/>
        </g>
        <g fill="#f5fbff">
          <rect x="6" y="4" width="1" height="1"/>
          <rect x="9" y="4" width="1" height="1"/>
        </g>
      </g>
    </symbol>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <rect x="0" y="0" width="1200" height="4" fill="url(#bar)"/>

  <g transform="translate(78 78)">
    <rect width="22" height="22" rx="4" fill="#ff5a36"/>
    <text x="36" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700" fill="#ffd9cc" letter-spacing="0.18em">DOCS.OPENCLAW.AI</text>
  </g>

  <g transform="translate(78 168)">
    <use href="#lobster" width="320" height="320"/>
  </g>

  <g transform="translate(440 226)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="124" font-weight="800" fill="#ffffff" letter-spacing="-3.5">OpenClaw</text>
    <text y="68" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" font-weight="500" fill="#e6dcd8" letter-spacing="-0.4">Bridge any chat app to your</text>
    <text y="112" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" font-weight="500" fill="#e6dcd8" letter-spacing="-0.4">AI coding agent.</text>
    <text y="166" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="500" fill="#9b8f8c" letter-spacing="0.04em">Slack · Discord · iMessage · Matrix · Telegram · WhatsApp · Teams</text>
  </g>

  <g transform="translate(78 524)">
    <rect width="10" height="10" rx="2" fill="#ff5a36"/>
    <text x="22" y="9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="600" fill="#ffffff">docs.openclaw.ai</text>
    <text x="22" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" font-weight="500" fill="#7b7472">Install · Quickstart · Channels · Gateway · CLI</text>
  </g>

  <g transform="translate(960 524)" opacity="0.85">
    <text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="600" fill="#ff8a5f" letter-spacing="0.18em">v1 · MIT</text>
    <text y="28" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="500" fill="#7b7472">github.com/openclaw/openclaw</text>
  </g>
